<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTF Classroom Leaderboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header>
        <h1>CTF Classroom Leaderboard</h1>
        <p id="updated">Updated: never</p>
      </header>

      <section class="panel">
        <h2>Ranked List</h2>
        <ol id="ranked" class="ranked"></ol>
      </section>

      <section class="panel">
        <h2>Horse Race</h2>
        <div id="race" class="race"></div>
      </section>
    </main>

    <script>
      async function loadLeaderboard() {
        const res = await fetch('/api/leaderboard');
        const data = await res.json();

        document.getElementById('updated').textContent = `Updated: ${data.updatedAt || 'never'}`;

        const ranked = document.getElementById('ranked');
        ranked.innerHTML = '';

        const race = document.getElementById('race');
        race.innerHTML = '';

        const maxPoints = Math.max(1, ...(data.players || []).map((p) => p.points));

        (data.players || []).forEach((player) => {
          const li = document.createElement('li');
          li.textContent = `${player.user} - ${player.points} pts (${player.completedCount} completed)`;
          ranked.appendChild(li);

          const row = document.createElement('div');
          row.className = 'horse-row';

          const label = document.createElement('span');
          label.className = 'horse-label';
          label.textContent = player.user;

          const track = document.createElement('div');
          track.className = 'track';

          const horse = document.createElement('div');
          horse.className = 'horse';
          horse.style.width = `${Math.round((player.points / maxPoints) * 100)}%`;
          horse.textContent = `${player.points} pts`;

          track.appendChild(horse);
          row.appendChild(label);
          row.appendChild(track);
          race.appendChild(row);
        });
      }

      loadLeaderboard();
      setInterval(loadLeaderboard, 5000);
    </script>
  </body>
</html>

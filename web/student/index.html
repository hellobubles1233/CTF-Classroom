<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTF Student Check-In</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="topbar panel">
        <div>
          <h1>CTF Check-In</h1>
          <p id="status">Loading session status...</p>
        </div>
        <div id="userBadge" class="user-badge">Not signed in</div>
      </header>

      <section class="panel" id="signupPanel">
        <h2>Join / Rejoin</h2>
        <form id="signupForm">
          <label for="name">Display name</label>
          <input id="name" name="name" required minlength="2" maxlength="40" />
          <button type="submit">Join / Rejoin</button>
        </form>
      </section>

      <section id="challengeArea" class="stack" hidden>
        <section class="panel">
          <h2>Category Progress</h2>
          <div id="progressBars" class="progress-bars"></div>
        </section>

        <section class="panel">
          <div class="row-between">
            <h2 id="currentTitle">Current Challenge</h2>
            <button id="manualCheckBtn" type="button">Manual Check</button>
          </div>
          <p id="currentMeta" class="muted"></p>
          <p id="currentBrief"></p>
          <ol id="currentGuide"></ol>
          <p id="currentHint" class="hint"></p>
          <ul id="currentResults" class="results"></ul>
        </section>

        <section class="panel">
          <h2>Challenge List</h2>
          <ol id="challengeList" class="challenge-list"></ol>
        </section>
      </section>

      <section class="panel small">
        <h2>How this works</h2>
        <p>Use the same display name to rejoin and resume challenge progress.</p>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
